<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Analyzer - SEO анализ веб-страниц</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Page Analyzer</a>
        </div>
    </nav>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body text-center p-5">
                        <h1 class="display-4 mb-3">Page Analyzer</h1>
                        <p class="lead text-muted mb-4">
                            Бесплатная проверка SEO параметров вашего сайта
                        </p>
                        
                        <form method="post" action="/urls">
                            <div class="input-group mb-3">
                                <input type="url" 
                                       name="url" 
                                       class="form-control form-control-lg" 
                                       placeholder="https://example.com" 
                                       required>
                                <button class="btn btn-primary btn-lg" type="submit">
                                    Анализировать
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-5 text-center text-muted">
        <div class="container">
            <p class="mb-0">© 2024 Page Analyzer</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
