<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="w-100 d-flex justify-content-start align-items-center ps-3">
            <a class="navbar-brand" href="/">Анализатор страниц</a>
            <span class="text-secondary ms-1" style="line-height: 1;">Сайты</span>
        </div>
    </nav>

    <main class="flex-grow-1">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="container mt-3">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="bg-light p-4 rounded shadow-sm border">
                        <h1 class="fw-normal display-4">Анализатор страниц</h1>
                        <p class="text-dark">Бесплатно проверяйте сайты на SEO-пригодность</p>
                        <form method="post" action="/urls" class="d-flex gap-3 mt-4">
                            <input type="url" 
                                   name="url" 
                                   class="form-control rounded" 
                                   placeholder="https://www.example.com" 
                                   required>
                            <button type="submit" class="btn btn-primary px-4 py-2">ПРОВЕРИТЬ</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-top mt-auto py-3">
        <div class="container text-center">
            <a href="https://ru.hexlet.io/" target="_blank" class="text-primary text-decoration-underline">Hexlet</a>
        </div>
    </footer>
</body>
</html>
