<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Анализатор страниц{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="w-100 d-flex justify-content-start align-items-center ps-3">
            <a class="navbar-brand" href="/">Анализатор страниц</a>
            <a href="{{ url_for('list_urls') }}" class="text-secondary text-decoration-none ms-3">Сайты</a>
        </div>
    </nav>

    <main class="flex-grow-1">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} mb-0 rounded-0" role="alert">
                        <div class="ps-2">{{ message }}</div>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="border-top mt-auto py-3">
        <div class="container text-center">
            <a href="https://ru.hexlet.io/" class="text-primary">Hexlet</a>
        </div>
    </footer>
</body>
</html>
